id: bancolombia-service-points-atms
info:
  name: bancolombia-service-points-atms
  author: user
  severity: info
  description: "Detecta los puntos de servicio de Bancolombia para los cajeros autom\xE1\
    ticos."
http:
- method: GET
  path:
  - https://api.us.apiconnect.ibmcloud.com/bancolombiabluemix-dev/testing/tec/v2/sales-service/cross-channel/service-points/atms?longitude=6.247759&latitude=-75.565575
  headers:
    accept: application/vnd.bancolombia.v1+json
    Cache-Control: no-cache
  matchers:
  - type: word
    words:
    - servicePointId
    - servicePointName
    part: body

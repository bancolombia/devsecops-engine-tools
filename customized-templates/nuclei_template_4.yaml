id: x-content-type-options-header

info:
  name: X Content Type Options Header
  author: devsecops
  severity: medium
  description: |
    The server lacks the HTTP X-Content-Type-Options header.
  metadata:
    max-request: 1
  tags: misconfig,headers,generic
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:L/I:L/A:N/E:P/RL:O/RC:C
    cvss-score: 4.3
http:
- method: GET
  path:
  - '{{BaseURL}}/private-bancolombia/testing/sufi/v2/operations-execution/product-specific/loans-sufi-catalogs/master-reference/MasterCatalogs/profesiones?businessLine=consumo'
  host-redirects: true
  max-redirects: 3

  matchers-condition: or
  matchers:
  - type: dsl
    name: missing-header
    dsl:
    - "!regex('(?i)x-content-type-options', header)"
    - status_code != 301 && status_code != 302
    condition: and
  headers:
    Client-Id: 9a8f346ce3cb89780d04dddf182f3bea
    Client-Secret: 47928ac67e9481feb2d41b507db8074b
    Content-Type: application/vnd.bancolombia.v4+json
    Ip-Client: 10.10.10.10
    Consumer-Id: '0'

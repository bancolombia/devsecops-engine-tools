id: permissions-policy-header

info:
  name: Permissions Policy
  author: devsecops
  severity: low
  description: |
    This template checks if the target website has a Permissions-Policy header, which allows or denies the use of browser features in a document or within any iframe elements in the document.
  metadata:
    max-request: 1
  tags: misconfig,headers,generic
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:U/C:L/I:N/A:N/E:U/RL:O/RC:C
    cvss-score: 2.7
http:
- method: GET
  path:
  - '{{BaseURL}}/private-bancolombia/testing/sufi/v2/operations-execution/product-specific/loans-sufi-catalogs/master-reference/MasterCatalogs/profesiones?businessLine=consumo'
  host-redirects: true
  max-redirects: 3

  matchers-condition: or
  matchers:
  - type: dsl
    name: missing-header
    dsl:
    - "!regex('(?i)permissions-policy', header)"
    - status_code != 301 && status_code != 302
    condition: and
  headers:
    Client-Id: 9a8f346ce3cb89780d04dddf182f3bea
    Client-Secret: 47928ac67e9481feb2d41b507db8074b
    Content-Type: application/vnd.bancolombia.v4+json
    Ip-Client: 10.10.10.10
    Consumer-Id: '0'

id: content-security-policy-header

info:
  name: Content Security Policy
  author: devsecops
  severity: low
  description: |
    The application has unnsafe configurations regarding the Content-Security-Policy header. This may be because:

    - Header is missing from server responses.
  metadata:
    max-request: 1
  tags: misconfig,headers,generic
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:U/C:L/I:L/A:N/E:P/RL:O/RC:C
    cvss-score: 3.8

http:
- method: GET
  path:
  - '{{BaseURL}}/private-bancolombia/testing/sufi/v2/operations-execution/product-specific/loans-sufi-catalogs/master-reference/MasterCatalogs/profesiones?businessLine=consumo'
  host-redirects: true
  max-redirects: 3

  matchers-condition: or
  matchers:
  - type: dsl
    name: content-security-policy
    dsl:
    - "!regex('(?i)content-security-policy', header)"
    - status_code != 301 && status_code != 302
    condition: and
  headers:
    Client-Id: 9a8f346ce3cb89780d04dddf182f3bea
    Client-Secret: 47928ac67e9481feb2d41b507db8074b
    Content-Type: application/vnd.bancolombia.v4+json
    Ip-Client: 10.10.10.10
    Consumer-Id: '0'

id: x-permitted-cross-domain-policies-header

info:
  name: Strict Transport Security Headers
  author: devsecops
  severity: low
  description: |
    The application does not define the security header X-Permitted-Cross-Domain-Policies, or it has it set to an insecure value.
  metadata:
    max-request: 1
  tags: misconfig,headers,generic
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:N/I:L/A:N/E:H/RL:O/RC:C
    cvss-score: 3.6
http:
- method:
    security_auth:
      type: client_secret
    method: GET
    path: 
      /private-bancolombia/testing/sufi/v2/operations-execution/product-specific/loans-sufi-catalogs/master-reference/MasterCatalogs/profesiones?businessLine=consumo
    headers: &id001
      Client-Id: 9a8f346ce3cb89780d04dddf182f3bea
      Client-Secret: 47928ac67e9481feb2d41b507db8074b
      Content-Type: application/vnd.bancolombia.v4+json
      Ip-Client: 10.10.10.10
      Consumer-Id: '0'
  path:
  - '{{BaseURL}}/private-bancolombia/testing/sufi/v2/operations-execution/product-specific/loans-sufi-catalogs/master-reference/MasterCatalogs/profesiones?businessLine=consumo'
  host-redirects: true
  max-redirects: 3

  matchers-condition: or
  matchers:
  - type: dsl
    name: missing-header
    dsl:
    - "!regex('(?i)x-permitted-cross-domain-policies', header)"
    - status_code != 301 && status_code != 302
    condition: and
  headers: *id001
